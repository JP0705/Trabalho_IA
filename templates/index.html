<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Industria 4.0</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- meu CSS -->
  <link rel="stylesheet" href="../static/style.css">
</head>

<body>

  <!-- MAIN -->
  <main class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <button class="btn btn-light rounded-pill px-4" id="new-chat-btn">
        <i class="bi bi-file-earmark-text"></i>
        Nova Consulta
      </button>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <!-- LEFT -->
      <div class="left-panel">

        <div class="card-custom">
          <div class="section-title">
            Situação Atual do maquinário
          </div>

          <div class="risk-item">
            <span>Seção A - 1</span>
            <span class="badge-soft">OK</span>
          </div>

          <div class="risk-item">
            <span>Seção A - 2</span>
            <span class="badge-soft">OK</span>
          </div>

          <div class="risk-item">
            <span>Seção A - 3</span>
            <span class="badge-soft">OK</span>
          </div>

          <div class="risk-item">
            <span>Seção B - 1</span>
            <span class="badge-soft">Temperatura elevada</span>
          </div>

          <div class="risk-item">
            <span>Seção B - 2</span>
            <span class="badge-soft">Em manutenção</span>
          </div>

          <div class="risk-item">
            <span>Seção C - 1</span>
            <span class="badge-soft">OK</span>
          </div>

          <div class="risk-item">
            <span>Seção C - 2</span>
            <span class="badge-soft">OK</span>
          </div>

          <div class="risk-item">
            <span>Seção C - 3</span>
            <span class="badge-soft">OK</span>
          </div>
        </div>

      </div>

      <!-- CHAT -->
      <div class="chat-wrapper">

        <div class="chat-header">
          <div>
            <h6 class="mb-0 fw-bold">Industria 4.0</h6>
            <small class="text-muted">
              Gestor de maquinário
            </small>
          </div>
        </div>

        <div class="chat-body" id="chat-body">

        </div>

        <div class="chat-footer">
          <div class="input-group">
            <input
              type="text"
              class="form-control chat-input"
              placeholder="Digite sua mensagem..."
              id="user-input"
            >

            <button class="btn btn-primary btn-send" id="send-btn">
              <i class="bi bi-send"></i>
            </button>
          </div>
        </div>

      </div>

    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
